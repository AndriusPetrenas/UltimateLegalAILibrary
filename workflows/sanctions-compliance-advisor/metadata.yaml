  - sanctions-screening
  - compliance-assessment
  - multi-jurisdictional-analysis
  - ownership-cascade
  - designated-entity-screening
models_used:
  - gpt-4.1 (default, configurable)
requires_dataset: false
node_count: 2
node_types:
  - start
  - sanctions_advisor
features:
  - intake-questionnaire
  - concurrent-theory-analysis
  - dual-model-evaluation
  - ownership-cascade-analysis
  - real-time-web-search
  - database-provision-lookup
  - entity-screening
  - multi-jurisdictional-coverage
  - real-time-sse-streaming
author:
  name: "QueryLex Team"
  website: "https://querylex.com"
license: CC0
